name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # NOTE: action versions are intentionally old (v3 / v4) so the
      # `github-actions` ecosystem block in dependabot.yml has bumps to propose.
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      # pyyaml 5.4.1 has no wheel for Python >=3.10 and its setup.py is
      # incompatible with Cython 3 (released 2023). We deliberately keep the
      # old pin in requirements.txt so Dependabot has a CVE to flag, so we
      # pre-install an older Cython and disable PEP 517 build isolation so
      # pip's wheel-build env actually uses it.
      - run: pip install --upgrade pip
      - run: pip install "cython<3" wheel setuptools
      - run: pip install --no-build-isolation -r requirements.txt
      - run: python -c "import requests, yaml, click, boto3; print('imports ok')"
