name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # NOTE: action versions are intentionally old (v3 / v4) so the
      # `github-actions` ecosystem block in dependabot.yml has bumps to propose.
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          # Pinned to 3.9 because pyyaml 5.4.1 has no wheel for >=3.10 and
          # fails to build from source against modern Cython 3. The point of
          # this repo is for Dependabot to *propose* bumping pyyaml — so we
          # keep the old pin in requirements.txt and adjust CI to suit it.
          python-version: "3.9"
      - run: pip install -r requirements.txt
      - run: python -c "import requests, yaml, click, boto3; print('imports ok')"
